<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMVOIR</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0d0d0d;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 80px 20px;
            text-align: center;
        }
        h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        p {
            font-size: 20px;
            opacity: 0.8;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 40px;
            padding: 14px 32px;
            background: #ffffff;
            color: #000000;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 6px;
        }
        .btn:hover {
            background: #e5e5e5;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AMVOIR</h1>
        <p>Технологии. Интеллект. Инфраструктура будущего.</p>
        <a class="btn" href="#">Скоро запуск</a>
    </div>
</body>
</html>
